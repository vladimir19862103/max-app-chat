<!DOCTYPE html>
<html lang="ru">
<head>
  <script src="https://api.max.ru/bridge.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Запись в салон</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f0f2f5; /* как фон чата MAX */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
    }
    .app {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 90vh;
    }
    .header {
      background: linear-gradient(135deg, #b76e79, #9b4b5a);
      padding: 20px;
      text-align: center;
      color: white;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .steps-container {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
    }
    .step { display: none; }
    .step.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .service-grid, .date-grid, .time-grid {
      display: grid;
      gap: 10px;
      margin: 16px 0;
    }
    .service-grid { grid-template-columns: 1fr 1fr; }
    .date-grid { grid-template-columns: repeat(auto-fill, minmax(90px,1fr)); }
    .time-grid { grid-template-columns: repeat(3, 1fr); }
    .card {
      background: #f9f9fb;
      border: 1.5px solid #e1e3e6;
      border-radius: 16px;
      padding: 14px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .card:hover { border-color: #b76e79; background: #fef7f8; }
    .card.selected { border-color: #b76e79; background: #f8e5e8; font-weight: 600; }
    .card.unavailable { opacity: 0.5; text-decoration: none; background: #f0f0f0; border-color: #ddd; color: #999; cursor: not-allowed; }
    .card .price { font-size: 0.8rem; color: #777; margin-top: 4px; }
    .input-field {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e1e3e6;
      border-radius: 14px;
      font-size: 16px; /* чтобы не было зума на iOS */
      margin: 8px 0 12px;
      background: #f9f9fb;
      outline: none;
    }
    .input-field:focus { border-color: #b76e79; background: white; }
    .btn {
      background: #b76e79;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    .btn:disabled { background: #d5c0c4; cursor: not-allowed; }
    .btn-secondary { background: #f0f2f5; color: #333; }
    .nav-row { display: flex; gap: 10px; margin-top: 20px; }
    .nav-row .btn { flex:1; }
    .confirmation {
      background: #e8f5e9;
      border-radius: 16px;
      padding: 16px;
      margin: 16px 0;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .error-text { color: #d32f2f; text-align: center; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">Запись в салон красоты</div>
    <div class="steps-container" id="steps-container">
      <!-- Шаг 1: Выбор услуги -->
      <div class="step active" id="step-service">
        <h3 style="margin-bottom:12px;">Выберите услугу</h3>
        <div class="service-grid" id="services-list"></div>
        <div class="nav-row">
          <button class="btn" id="to-date" disabled>Далее</button>
        </div>
        <div class="error-text" id="service-error"></div>
      </div>

      <!-- Шаг 2: Дата и время -->
      <div class="step" id="step-date">
        <h3>Выберите дату</h3>
        <div class="date-grid" id="date-grid"></div>
        <h3 style="margin-top:16px;">Свободное время</h3>
        <div class="time-grid" id="timeslots-list">Загрузка...</div>
        <div class="nav-row">
          <button class="btn btn-secondary" id="back-from-date">Назад</button>
          <button class="btn" id="to-contacts" disabled>Далее</button>
        </div>
        <div class="error-text" id="date-error"></div>
      </div>

      <!-- Шаг 3: Контакты -->
      <div class="step" id="step-contacts">
        <h3>Ваши данные</h3>
        <input class="input-field" type="text" id="client-name" placeholder="Ваше имя">
        <input class="input-field" type="tel" id="client-phone" placeholder="Телефон (например, +7...)">
        <textarea class="input-field" id="client-note" rows="2" placeholder="Пожелания (необязательно)"></textarea>
        <div class="nav-row">
          <button class="btn btn-secondary" id="back-from-contacts">Назад</button>
          <button class="btn" id="to-confirm">Далее</button>
        </div>
        <div class="error-text" id="contacts-error"></div>
      </div>

      <!-- Шаг 4: Подтверждение -->
      <div class="step" id="step-confirm">
        <h3>Подтверждение</h3>
        <div class="confirmation" id="summary"></div>
        <div class="nav-row">
          <button class="btn btn-secondary" id="back-from-confirm">Назад</button>
          <button class="btn" id="submit-booking">Записаться</button>
        </div>
        <div class="error-text" id="confirm-error"></div>
      </div>

      <!-- Шаг 5: Готово -->
      <div class="step" id="step-done">
        <h3>✅ Готово!</h3>
        <p style="text-align:center; margin:20px 0;">Спасибо! Мы свяжемся с вами.</p>
        <button class="btn" id="close-app">Закрыть</button>
      </div>
    </div>
  </div>

  <script>
    // === НАСТРОЙКИ ===
    const PROXY_URL = 'https://script.google.com/macros/s/AKfycbzU5ada_qWn46FOxW7cK5kiMuKVLHg22kveUOxEipQ2ZG4qSWnDkBjOiIPAHWuCdQCE/exec'; // ← замените!

    // === СОСТОЯНИЕ ===
    const state = { service:null, date:null, time:null, name:'', phone:'', note:'' };

    // Услуги
    const services = [
      { id: 'haircut', name: 'Стрижка жен.', dur: 60, price: '2500₽' },
      { id: 'color', name: 'Окрашивание', dur: 120, price: '5000₽' },
      { id: 'manicure', name: 'Маникюр', dur: 45, price: '1800₽' },
      { id: 'pedicure', name: 'Педикюр', dur: 60, price: '2200₽' },
      { id: 'massage', name: 'Массаж спины', dur: 30, price: '1500₽' },
      { id: 'cosmo', name: 'Косметолог', dur: 30, price: 'бесплатно' }
    ];

    // Все возможные слоты с 10:00 до 17:30 с шагом 30 мин
    const ALL_SLOTS = [];
    for (let h = 10; h <= 17; h++) {
      for (let m of [0, 30]) {
        if (h === 17 && m === 30) continue;
        ALL_SLOTS.push(`${h}:${m.toString().padStart(2,'0')}`);
      }
    }

    // === ИНИЦИАЛИЗАЦИЯ ===
    document.addEventListener('DOMContentLoaded', () => {
      initServiceCards();
      bindNavigation();
    });

    function initServiceCards() {
      const container = document.getElementById('services-list');
      services.forEach(s => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<div>${s.name}</div><div class="price">${s.dur} мин · ${s.price}</div>`;
        card.dataset.id = s.id;
        card.addEventListener('click', () => selectService(s, card));
        container.appendChild(card);
      });
    }

    function selectService(service, element) {
      document.querySelectorAll('#services-list .card').forEach(el => el.classList.remove('selected'));
      element.classList.add('selected');
      state.service = service;
      document.getElementById('to-date').disabled = false;
      document.getElementById('service-error').textContent = '';
    }

    // === НАВИГАЦИЯ ===
    function bindNavigation() {
      document.getElementById('to-date').addEventListener('click', () => {
        if (!state.service) return;
        showStep('step-date');
        generateDateCards();
      });
      document.getElementById('back-from-date').addEventListener('click', () => showStep('step-service'));
      document.getElementById('back-from-contacts').addEventListener('click', () => showStep('step-date'));
      document.getElementById('back-from-confirm').addEventListener('click', () => showStep('step-contacts'));

      document.getElementById('to-contacts').addEventListener('click', () => {
        if (!state.date || !state.time) {
          document.getElementById('date-error').textContent = 'Выберите дату и время';
          return;
        }
        showStep('step-contacts');
      });

      document.getElementById('to-confirm').addEventListener('click', () => {
        state.name = document.getElementById('client-name').value.trim();
        state.phone = document.getElementById('client-phone').value.trim();
        state.note = document.getElementById('client-note').value.trim();
        if (!state.name || !state.phone) {
          document.getElementById('contacts-error').textContent = 'Введите имя и телефон';
          return;
        }
        document.getElementById('contacts-error').textContent = '';
        renderSummary();
        showStep('step-confirm');
      });

      document.getElementById('submit-booking').addEventListener('click', submitBooking);
      document.getElementById('close-app').addEventListener('click', () => {
        if (window.Telegram?.WebApp?.close) window.Telegram.WebApp.close();
        else window.close();
      });
    }

    function showStep(stepId) {
      document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
      document.getElementById(stepId).classList.add('active');
    }

    // === ГЕНЕРАЦИЯ ДАТ ===
    function generateDateCards() {
      const grid = document.getElementById('date-grid');
      grid.innerHTML = '';
      const today = new Date();
      let count = 0;
      for (let i = 0; count < 7; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() + i);
        if (d.getDay() === 0) continue; // вс – выходной
        const dateStr = d.toISOString().slice(0,10);
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<div>${d.toLocaleDateString('ru-RU',{weekday:'short'})}</div><div><strong>${d.getDate()}</strong></div>`;
        card.dataset.date = dateStr;
        card.addEventListener('click', () => {
          document.querySelectorAll('#date-grid .card').forEach(el => el.classList.remove('selected'));
          card.classList.add('selected');
          state.date = dateStr;
          state.time = null;
          document.getElementById('to-contacts').disabled = true;
          loadTimeSlots(dateStr);
        });
        grid.appendChild(card);
        count++;
      }
    }

    // === ЗАГРУЗКА СЛОТОВ (с запасным вариантом) ===
    async function loadTimeSlots(date) {
      const container = document.getElementById('timeslots-list');
      container.innerHTML = 'Загрузка...';
      try {
        const res = await fetch(`${PROXY_URL}?action=slots&date=${date}`);
        if (!res.ok) throw new Error('Сервер вернул ошибку');
        const data = await res.json();
        renderTimeSlots(data.booked || []);
      } catch (err) {
        console.warn('Не удалось загрузить занятые слоты, показываем все свободными', err);
        // Запасной вариант: все слоты свободны
        renderTimeSlots([]);
        // Можно показать уведомление, но не блокировать интерфейс
      }
    }

    function renderTimeSlots(bookedSlots) {
      const container = document.getElementById('timeslots-list');
      container.innerHTML = '';
      ALL_SLOTS.forEach(slot => {
        const card = document.createElement('div');
        card.className = 'card';
        card.textContent = slot;
        if (bookedSlots.includes(slot)) {
          card.classList.add('unavailable');
        } else {
          card.addEventListener('click', () => {
            document.querySelectorAll('#timeslots-list .card').forEach(el => el.classList.remove('selected'));
            card.classList.add('selected');
            state.time = slot;
            document.getElementById('to-contacts').disabled = false;
            document.getElementById('date-error').textContent = '';
          });
        }
        container.appendChild(card);
      });
    }

    // === ПОДТВЕРЖДЕНИЕ И ОТПРАВКА ===
    function renderSummary() {
      const s = state.service;
      document.getElementById('summary').innerHTML = `
        <strong>${s.name}</strong> (${s.price})<br>
        📅 ${new Date(state.date).toLocaleDateString('ru-RU', {day:'numeric',month:'long',weekday:'short'})}<br>
        ⏰ ${state.time}<br>
        👤 ${state.name}<br>
        📞 ${state.phone}
        ${state.note ? `<br>📝 ${state.note}` : ''}
      `;
    }

    async function submitBooking() {
      const btn = document.getElementById('submit-booking');
      btn.disabled = true;
      btn.textContent = 'Отправка...';
      try {
        const res = await fetch(PROXY_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'book',
            service: state.service,
            date: state.date,
            time: state.time,
            clientName: state.name,
            clientPhone: state.phone,
            clientNote: state.note
          })
        });
        const result = await res.json();
        if (!result.ok) throw new Error(result.error || 'Ошибка записи');
        showStep('step-done');
      } catch (err) {
        document.getElementById('confirm-error').textContent = err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Записаться';
      }
    }
  </script>
</body>
</html>
